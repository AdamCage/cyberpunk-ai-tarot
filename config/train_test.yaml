job: extension
config:
  # ТЕСТОВЫЙ ПРОГОН: ~5-10 минут
  # Цель — убедиться что пайплайн работает, качество намеренно низкое
  name: cp2077_tarot_lora_TEST
  process:
    - type: sd_trainer
      training_folder: "${PROJECT_ROOT}/output_test"
      device: cuda:0
      trigger_word: "${TRIGGER_WORD}"

      save:
        dtype: float16
        save_every: ${TEST_STEPS}
        max_step_saves_to_keep: 1

      datasets:
        - folder_path: "${PROJECT_ROOT}/data/originals"
          caption_ext: txt
          resolution:
            - ${TEST_RESOLUTION_W}
            - ${TEST_RESOLUTION_H}
          num_repeats: ${TEST_NUM_REPEATS}
          shuffle_tokens: false
          random_flip: false

      train:
        batch_size: 1
        steps: ${TEST_STEPS}
        gradient_accumulation_steps: 1
        train_unet: true
        train_text_encoder: false
        gradient_checkpointing: true
        noise_scheduler: "flowmatch"
        optimizer: "adamw8bit"
        lr: ${TEST_TRAINING_LR}
        lr_scheduler: "constant"
        ema_config:
          use_ema: false

      model:
        name_or_path: "${HF_MODEL_PATH}"
        is_flux: true
        quantize: true

      network:
        type: lora
        linear: ${TEST_RANK}
        linear_alpha: ${TEST_RANK}

      sample:
        sampler: "flowmatch"
        sample_every: ${TEST_STEPS}
        width: ${TEST_RESOLUTION_W}
        height: ${TEST_RESOLUTION_H}
        prompts:
          - "${TRIGGER_WORD}, tarot card illustration, cyberpunk city vibe, graphic poster style, matte ink gouache look, a hooded figure"
        neg: "photorealism, 3d render, blurry, watermark"
        seed: 42
        walk_seed: false
        guidance_scale: 4.0
        sample_steps: 20
